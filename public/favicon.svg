<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="r3x Trigger Reactor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#040406"/>
      <stop offset="100%" stop-color="#0f0f18"/>
    </linearGradient>
    <linearGradient id="core-grad" x1="23" y1="23" x2="41" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7928ca"/>
      <stop offset="50%" stop-color="#ff007a"/>
      <stop offset="100%" stop-color="#4a00e0"/>
    </linearGradient>
    <filter id="core-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4.5" flood-color="#ff007a" flood-opacity="0.8"/>
    </filter>
    <filter id="node-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#00f2fe" flood-opacity="0.9"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none" stroke="#1d1d2b" stroke-width="1.5"/>

  <circle cx="32" cy="32" r="23" fill="none" stroke="#7928ca" stroke-width="1.5" stroke-dasharray="4,8" opacity="0.5"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#ff007a" stroke-width="1.5" stroke-dasharray="14,6,4,6" opacity="0.6"/>
  <circle cx="32" cy="32" r="13" fill="none" stroke="#ffffff" stroke-width="0.75" stroke-dasharray="2,2" opacity="0.3"/>

  <line x1="32" y1="32" x2="19" y2="20" stroke="#00f2fe" stroke-width="2.5" opacity="0.7"/>
  <line x1="32" y1="32" x2="48" y2="38" stroke="#ff007a" stroke-width="2.5" opacity="0.7"/>
  <line x1="32" y1="32" x2="22" y2="44" stroke="#ffffff" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,2"/>

  <circle cx="32" cy="32" r="8.5" fill="url(#core-grad)" filter="url(#core-glow)"/>
  <circle cx="32" cy="32" r="3" fill="#ffffff"/>

  <circle cx="19" cy="20" r="4.5" fill="#00f2fe" filter="url(#node-glow)"/>
  <circle cx="19" cy="20" r="1.5" fill="#ffffff"/>

  <circle cx="48" cy="38" r="4.5" fill="#ff007a" filter="url(#core-glow)"/>
  <circle cx="48" cy="38" r="1.5" fill="#ffffff"/>

  <circle cx="22" cy="44" r="2.5" fill="#ffffff"/>
  <circle cx="42" cy="16" r="1" fill="#7928ca"/>
  <circle cx="20" cy="48" r="1" fill="#ff007a"/>
</svg>
