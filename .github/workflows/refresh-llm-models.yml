name: Refresh LLM models

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Refresh model registry
        run: bin/llm-models refresh

      - name: Commit updated registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/llm_models.json
          if git diff --cached --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "chore: refresh LLM model registry"
            git push
          fi
