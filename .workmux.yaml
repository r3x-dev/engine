worktree_dir: ".."
# window_prefix: ""  # Odkomentuj żeby usunąć prefix 'wm-' (domyślnie: wm-<branch>)

files:
  copy:
    - ".env"
    - "workflows/"

post_create:
  - mise trust

# Nadpisuje globalne panes — just setup przed agentem (w panelu tmux)
panes:
  - command: <agent>
    focus: true
  - command: just setup
    split: horizontal
    percentage: 30
