<%
  rails_max_threads = Integer(ENV.fetch("RAILS_MAX_THREADS", 5))
  job_threads = ENV["JOB_THREADS"].to_s.empty? ? 0 : Integer(ENV["JOB_THREADS"])
  solid_queue_pool = job_threads.zero? ? 0 : job_threads + 2
%>

# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  # Solid Queue needs extra connections for its supervisor and heartbeat threads.
  max_connections: <%= [rails_max_threads, solid_queue_pool].max %>
  timeout: 5000

sqlite: &sqlite
  <<: *default
  adapter: sqlite3

development:
  primary:
    <<: *sqlite
    database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *sqlite
    database: storage/test.sqlite3

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    <% if ENV["R3X_DATABASE_URL"].present? %>
    url: <%= ENV["R3X_DATABASE_URL"] %>
    <% else %>
    adapter: sqlite3
    database: <%= ENV.fetch("R3X_DATABASE_PATH", "storage/production.sqlite3") %>
    <% end %>
