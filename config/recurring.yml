development:
  porto_santo_news:
    class: R3x::RunWorkflowJob
    args: [porto_santo_news]
    schedule: "*/15 * * * *"
    queue: default

production:
  porto_santo_news:
    class: R3x::RunWorkflowJob
    args: [porto_santo_news]
    schedule: "*/15 * * * *"
    queue: default

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
